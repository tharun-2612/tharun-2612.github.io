<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Tharun Mohite Vasanth Portfolio</title>
  <desc id="desc">Junior Front-End Developer portfolio preview</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1524"/>
      <stop offset="1" stop-color="#10223a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.34">
    <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M160 0v630M320 0v630M480 0v630M640 0v630M800 0v630M960 0v630" stroke="#ffffff" stroke-width="1"/>
  </g>
  <circle cx="1020" cy="120" r="170" fill="#67e8f9" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="160" cy="520" r="200" fill="#8b5cf6" opacity="0.13" filter="url(#softGlow)"/>

  <rect x="78" y="78" width="1044" height="474" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)"/>
  <path d="M78 118h1044" stroke="url(#accent)" stroke-width="6"/>

  <text x="120" y="190" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="2">PORTFOLIO</text>
  <text x="120" y="285" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">Tharun Mohite Vasanth</text>
  <text x="120" y="355" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600">Junior Front-End Developer</text>
  <text x="120" y="430" fill="#9fb0c7" font-family="Inter, Arial, sans-serif" font-size="26">Responsive UI, secure authentication flows, and full-stack project experience.</text>

  <g transform="translate(120 486)">
    <rect width="150" height="44" rx="8" fill="rgba(103,232,249,0.12)" stroke="rgba(103,232,249,0.36)"/>
    <text x="24" y="30" fill="#cffafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">HTML CSS JS</text>
  </g>
  <g transform="translate(292 486)">
    <rect width="122" height="44" rx="8" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.34)"/>
    <text x="24" y="30" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">React</text>
  </g>
  <g transform="translate(436 486)">
    <rect width="204" height="44" rx="8" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.34)"/>
    <text x="24" y="30" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Node Express MongoDB</text>
  </g>
</svg>
